
# Rustfs
#
# Usage:
#   docker compose -f ./docker/compose/rustfs.yml up -d --build
#
# Connect to SQL client:
#   docker exec -it jobmanager ./bin/sql-client.sh
services:

  volume-permission-helper:
    image: alpine
    volumes:
      - rustfs_data_0:/data0
      - logs:/logs
    command: >
      sh -c "
        chown -R 10001:10001 /data0 /logs &&
        echo 'Volume Permissions fixed' &&
        exit 0
      "
    restart: "no"

  # RustFS main service
  rustfs:
    image: rustfs/rustfs:latest
    container_name: rustfs
    security_opt:
      - "no-new-privileges:true"
    ports:
      - "19000:9000" # S3 API port
      - "19001:9001" # Console port
    environment:
      - RUSTFS_VOLUMES=/data/rustfs0
      - RUSTFS_ADDRESS=0.0.0.0:9000
      - RUSTFS_CONSOLE_ADDRESS=0.0.0.0:9001
      - RUSTFS_CONSOLE_ENABLE=true
      - RUSTFS_CORS_ALLOWED_ORIGINS=*
      - RUSTFS_CONSOLE_CORS_ALLOWED_ORIGINS=*
      - RUSTFS_ACCESS_KEY=${AWS_ACCESS_KEY_ID:-n3xtchen}
      - RUSTFS_SECRET_KEY=${AWS_SECRET_ACCESS_KEY:-n3xtchen}
      - RUSTFS_OBS_LOGGER_LEVEL=info
      - RUSTFS_TLS_PATH=/opt/tls
      # Object Cache
      - RUSTFS_OBJECT_CACHE_ENABLE=true
      - RUSTFS_OBJECT_CACHE_TTL_SECS=300

    volumes:
      - rustfs_data_0:/data/rustfs0
      - logs:/app/logs
    networks:
      shared_net:
        aliases:
          - nextfs
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "sh", "-c",
          "curl -f http://127.0.0.1:9000/health && curl -f http://127.0.0.1:9001/rustfs/console/health"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  shared_net:
    external: true
    name: n3xt_net

volumes:
  rustfs_data_0:
  logs:
